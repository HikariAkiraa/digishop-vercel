apiVersion: v1
kind: ConfigMap
metadata:
  name: digishop-db-init
data:
  init.sql: |
    CREATE TABLE roles (
        id   SERIAL PRIMARY KEY,
        name VARCHAR(50) NOT NULL UNIQUE
    );
    INSERT INTO roles (name) VALUES ('admin'), ('manager');

    CREATE TABLE users (
        id            SERIAL PRIMARY KEY,
        name          VARCHAR(100) NOT NULL,
        email         VARCHAR(100) NOT NULL UNIQUE,
        password_hash TEXT NOT NULL,
        role_id       INT NOT NULL REFERENCES roles(id),
        created_at    TIMESTAMP DEFAULT CURRENT_TIMESTAMP
    );
    INSERT INTO users (name, email, password_hash, role_id) VALUES ('Admin', 'digilab@digishop.com', '$2b$10$nnGgQuWiBfY1nV9i2QXa9.25cuvVP/AdKvCXKIFTT4bkh3y7HhLaa', 1);

    CREATE TABLE categories (
        id          SERIAL PRIMARY KEY,
        name        VARCHAR(100) NOT NULL UNIQUE,
        description TEXT
    );
    INSERT INTO categories (name, description) VALUES
    ('IC Digital',  'Integrated Circuit logika digital'),
    ('Packet',      'Pack gabungan komponen dengan utilitas tertentu'),
    ('Mikon',       'Modul siap pakai seperti Arduino, ESP');

    CREATE TABLE products (
        id          SERIAL PRIMARY KEY,
        name        VARCHAR(150) NOT NULL,
        sku         VARCHAR(50)  NOT NULL UNIQUE,
        description TEXT,
        cost_price  INT          NOT NULL DEFAULT 0 CHECK (cost_price >= 0),
        price       INT          NOT NULL CHECK (price >= 0),
        stock       INT          NOT NULL DEFAULT 0 CHECK (stock >= 0),
        category_id INT REFERENCES categories(id),
        image_url   TEXT,
        created_at  TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
        updated_at  TIMESTAMP DEFAULT CURRENT_TIMESTAMP
    );

    CREATE TABLE stock_movements (
        id         SERIAL PRIMARY KEY,
        product_id INT         NOT NULL REFERENCES products(id),
        type       VARCHAR(10) NOT NULL CHECK (type IN ('IN', 'OUT')),
        quantity   INT         NOT NULL CHECK (quantity > 0),
        note       TEXT,
        user_id    INT         NOT NULL REFERENCES users(id),
        created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
    );

    CREATE TABLE transactions (
        id           SERIAL PRIMARY KEY,
        user_id      INT NOT NULL REFERENCES users(id),
        total_amount INT NOT NULL CHECK (total_amount >= 0),
        total_profit INT NOT NULL DEFAULT 0,
        created_at   TIMESTAMP DEFAULT CURRENT_TIMESTAMP
    );

    CREATE TABLE transaction_items (
        id             SERIAL PRIMARY KEY,
        transaction_id INT NOT NULL REFERENCES transactions(id) ON DELETE CASCADE,
        product_id     INT NOT NULL REFERENCES products(id),
        quantity       INT NOT NULL CHECK (quantity > 0),
        price_at_time  INT NOT NULL CHECK (price_at_time >= 0),
        cost_at_time   INT NOT NULL DEFAULT 0 CHECK (cost_at_time >= 0)
    );

    CREATE OR REPLACE FUNCTION update_updated_at()
    RETURNS TRIGGER AS $$
    BEGIN
        NEW.updated_at = CURRENT_TIMESTAMP;
        RETURN NEW;
    END;
    $$ LANGUAGE plpgsql;

    CREATE TRIGGER trg_products_updated_at
    BEFORE UPDATE ON products
    FOR EACH ROW EXECUTE FUNCTION update_updated_at();

    CREATE TABLE IF NOT EXISTS contacts (
        id SERIAL PRIMARY KEY,
        name VARCHAR(255) NOT NULL,
        discord VARCHAR(255) NOT NULL,
        discord_id VARCHAR(255),
        whatsapp VARCHAR(255),
        image_url TEXT,
        created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
        updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
    );
